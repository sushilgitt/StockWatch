[auth]
redirect_urls = [
  "https://stock-ping-d9c5fb061419.herokuapp.com/auth/callback",
  "https://stock-ping-d9c5fb061419.herokuapp.com/auth/shopify/callback",
  "https://stock-ping-d9c5fb061419.herokuapp.com/api/auth/callback"
